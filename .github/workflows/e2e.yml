name: E2E

# Verrou des tests : exécuté sur chaque Pull Request. Build l'app, la démarre en
# local (mode démo, données mock — aucun secret requis), puis lance Playwright
# (crawler anti-crash + parcours clés). La PR est bloquée si un test échoue.
# N'utilise AUCUNE donnée non fiable de l'événement GitHub dans les commandes.

on:
  pull_request:
  workflow_dispatch:

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      E2E_BYPASS_SECRET: ci-e2e-secret
      CI: "true"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Build
        run: npm run build

      - name: Run E2E tests
        run: npm run test:e2e

      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
