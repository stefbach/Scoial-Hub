name: Playwright Tests (Robot Utilisateur Cloud)
on:
  push:
    branches-ignore:
      - main # Évite de faire tourner les tests en double sur la branche de production directe

jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - uses: actions/setup-node@v4
      with:
        node-version: lts/*

    - name: Install dependencies
      run: npm ci || npm install

    - name: Install Playwright Browsers
      run: npx playwright install --with-deps chromium

    # L'app tourne en MODE DÉMO (données mock) quand Supabase n'est pas
    # configuré : on NE passe AUCUNE variable Supabase, sinon l'app croit
    # Supabase actif et les appels (ex. /api/connectors) échouent contre une
    # URL invalide. Cohérent avec le workflow e2e.yml (qui passe).
    - name: Build Next.js Application
      run: npm run build

    - name: Run Playwright tests
      run: npx playwright test
      env:
        E2E_BYPASS_SECRET: ci-e2e-secret
        CI: "true"

    - name: Upload Playwright report
      uses: actions/upload-artifact@v4
      if: ${{ !cancelled() }}
      with:
        name: playwright-report
        path: playwright-report/
        retention-days: 30
